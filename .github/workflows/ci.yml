name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test_db       # test.yml의 설정과 반드시 일치해야 함
          MYSQL_ROOT_PASSWORD: test_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run code formatting check
        run: ./gradlew spotlessCheck

      - name: Run tests
        run: ./gradlew test

      - name: Run contract tests
        run: |
          if [ -d "src/contractTest/resources/contracts" ] && [ "$(find src/contractTest/resources/contracts -name "*.groovy" -o -name "*.yml" -o -name "*.yaml" | wc -l)" -gt 0 ]; then
            echo "Contract files found, running contract tests..."
            ./gradlew contractTest
          else
            echo "No contract files found, skipping contract tests..."
          fi

      - name: Build application
      
        run: ./gradlew build -x test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/

