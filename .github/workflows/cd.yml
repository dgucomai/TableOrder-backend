name: Backend CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code # 저장소에 있는 코드 가져오기
        uses: actions/checkout@v4

      - name: Set up JDK 21 # JDK 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle # Gradle 설정, 종속성 및 빌드 캐시를 자동으로 관리
        uses: gradle/actions/setup-gradle@v4 # v4.0.0
        with:
          cache-read-only: false # 캐시 읽기 및 쓰기 활성화

      - name: Grant Execute Permission For Gradlew # Gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: Build with Gradle # Gradle 빌드 실행
        run: ./gradlew clean build -x test --no-daemon

      - name: Test with Gradle # 테스트 실행
        run: ./gradlew test

      - name: Rename Build File # 빌드된 JAR 파일 이름 변경
        run: mv $(ls ./build/libs/*.jar | head -n 1) ./main.jar

      - name: Transfer Build File to Main Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: main.jar
          target: /root/


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Main Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            fuser -k -n tcp 8080 || true
            nohup java -jar main.jar > ./output.log 2>&1 &
            mv output.log output_$(date +%Y%m%d-%H%M%S).log
          debug: true
